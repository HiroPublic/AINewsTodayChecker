name: Daily AI News Verification

on:
  schedule:
    - cron: "20 21 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-daily:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/cache/restore@v4
        with:
          path: .state
          key: ai-news-state-${{ github.ref_name }}
          restore-keys: |
            ai-news-state-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run daily job
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          VERIFIER_PROVIDER: ${{ vars.VERIFIER_PROVIDER }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}
          PERPLEXITY_MODEL: ${{ vars.PERPLEXITY_MODEL }}
        run: |
          mkdir -p .state
          python scripts/run_daily.py

      - name: Upload verification artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verification-artifacts
          path: artifacts/*.json
          if-no-files-found: warn

      - name: Commit updated artifacts
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add artifacts/prompt.json artifacts/perplexity-response.json artifacts/gemini-response.json
          if git diff --cached --quiet; then
            echo "No artifact changes to commit"
            exit 0
          fi
          git commit -m "chore: update verification artifacts"
          git push origin HEAD:${{ github.ref_name }}

      - name: Save state cache
        if: success()
        uses: actions/cache/save@v4
        with:
          path: .state
          key: ai-news-state-${{ github.ref_name }}
